name: rag-toolkit

# `docker compose` automatically loads `.env` from this directory.
# HF_TOKEN and JUPYTERHUB_ADMIN are interpolated from there at runtime and
# forwarded into the hub container (and onward to notebook / benchmark-runner
# containers). The token is never baked into an image or source file.

services:

  # ──────────────────────────────────────────────────────────────────────
  # notebook-builder
  #
  # SOLE PURPOSE: build Dockerfile.notebook and tag the result as
  # rag-notebook:0.2.0 so DockerSpawner can find it locally.
  # ──────────────────────────────────────────────────────────────────────
  notebook-builder:
    build:
      context: .
      dockerfile: Dockerfile.notebook
    image: rag-notebook:0.2.0
    entrypoint: ["true"]
    command: []
    restart: "no"

  # ──────────────────────────────────────────────────────────────────────
  # ollama
  # ──────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.8
    container_name: ollama
    restart: unless-stopped

    environment:
      OLLAMA_KEEP_ALIVE: 24h

    volumes:
      - ollama-data:/root/.ollama

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "ollama ps >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────
  # ollama-init
  # ──────────────────────────────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:0.6.8
    container_name: ollama-init
    restart: "no"

    depends_on:
      ollama:
        condition: service_healthy

    environment:
      OLLAMA_HOST: http://ollama:11434
      # Space-separated list of models to pull on first run.
      OLLAMA_MODELS: "mistral:latest"

    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        echo "Waiting for Ollama API..."
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        echo "Ollama API ready"

        for model in $${OLLAMA_MODELS}; do
          echo "Pulling: $$model"
          ollama pull "$$model"
        done

        echo "Installed models:"
        ollama list
        echo "Ollama bootstrap complete"

    volumes:
      - ollama-data:/root/.ollama

    networks:
      - backend

  # ──────────────────────────────────────────────────────────────────────
  # hub
  # ──────────────────────────────────────────────────────────────────────
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-hub:4.0
    container_name: hub

    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DOCKER_NOTEBOOK_IMAGE: rag-notebook:0.2.0
      # Must match networks.backend.name below.
      DOCKER_NETWORK_NAME: rag-toolkit_backend
      JUPYTERHUB_ADMIN: ${JUPYTERHUB_ADMIN:-admin}
      # HuggingFace token, interpolated from .env at runtime. Both canonical
      # names are populated from the single HF_TOKEN value so every library
      # (huggingface_hub, transformers, sentence-transformers) finds it.
      # jupyterhub_config.py forwards these to spawned notebook containers.
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HF_TOKEN:-}

    volumes:
      # Docker socket — required for DockerSpawner and self-inspection.
      - /var/run/docker.sock:/var/run/docker.sock
      # Config file — mounted read-only so edits take effect on restart.
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      # JupyterHub state (cookie secret, SQLite DB).
      - jupyterhub-data:/data
      # Staging mount points for shared content.
      - ./notebooks:/hub-mounts/notebooks:ro
      - ./data:/hub-mounts/data:ro
      # Operator-internal experiments tree (host-path resolution only; never
      # attached to student notebooks — see jupyterhub_config.py).
      - ./experiments:/hub-mounts/experiments:ro

    depends_on:
      notebook-builder:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully

    networks:
      - backend

volumes:
  jupyterhub-data:
  ollama-data:
  hf-cache:

networks:
  backend:
    name: rag-toolkit_backend
