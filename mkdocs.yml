site_name: RAG Toolkit
site_description: Local Retrieval-Augmented Generation toolkit
repo_url: https://example.com/rag-toolkit
edit_uri: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - API reference:
      - Overview: api.md
      - Ingestion: api/ingestion.md
      - Embedding: api/embedding.md
      - Indexing: api/indexing.md
      - Retrieval: api/retrieval.md
      - Generation: api/generation.md
      - Evaluation: api/evaluation.md
  - Development: development.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 2
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
